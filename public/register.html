<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Library | Create Account</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="register">
  <main class="login-wrap">
    <section class="card hero-card" aria-labelledby="registerHeading">
      <h1 id="registerHeading" class="hero-title">Create Your Library Account</h1>
      <p class="hero-subtitle">Register as a patron or librarian for this frontend demo.</p>
    </section>

    <section class="card" aria-labelledby="registerFormHeading">
      <h2 id="registerFormHeading">Sign up</h2>
      <form id="registerForm" class="form-grid" novalidate>
        <label for="registerFullName">Full name
          <input class="input" id="registerFullName" name="registerFullName" type="text" autocomplete="name" required>
        </label>

        <label for="registerUsername">Username
          <input class="input" id="registerUsername" name="registerUsername" type="text" autocomplete="username" required>
        </label>

        <label for="registerPassword">Password
          <input class="input" id="registerPassword" name="registerPassword" type="password" autocomplete="new-password" required>
        </label>

        <div class="password-checklist" aria-live="polite" aria-atomic="true">
          <p class="small password-checklist-title">Password requirements:</p>
          <ul id="passwordRequirements" class="password-list">
            <li id="passwordLengthRule" class="password-rule">12 characters</li>
            <li id="passwordUppercaseRule" class="password-rule">Uppercase letter</li>
            <li id="passwordLowercaseRule" class="password-rule">Lowercase letter</li>
            <li id="passwordNumberRule" class="password-rule">Number</li>
            <li id="passwordSymbolRule" class="password-rule">Special character</li>
          </ul>
        </div>

        <label for="registerConfirmPassword">Confirm password
          <input class="input" id="registerConfirmPassword" name="registerConfirmPassword" type="password" autocomplete="new-password" required>
        </label>

        <p id="confirmPasswordHint" class="small" aria-live="polite"></p>

        <!-- Role selection for demo purposes -->
        <fieldset>
          <legend>Account Type</legend>
          <label>
            <input type="radio" name="registerRole" value="patron" checked> Patron
          </label>
          <label>
            <input type="radio" name="registerRole" value="librarian"> Librarian
          </label>
        </fieldset>

        <label for="librarianPin" id="librarianPinLabel" style="display: none;">
          Librarian PIN
          <input class="input" id="librarianPin" name="librarianPin" type="password" autocomplete="off">
        </label>

        <!-- Role selection is enforced server-side; frontend defaults to patron to prevent client-side privilege escalation -->
        <input type="hidden" id="registerRole" name="registerRole" value="patron">

        <div class="button-row">
          <button class="btn btn-primary" type="submit">Create Account</button>
          <a class="btn btn-outline" href="index.html">Back to Login</a>
        </div>

        <p id="registerMessage" class="message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="assets/js/api.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
