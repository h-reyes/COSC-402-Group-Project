<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Library | Book Catalog</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="catalog">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="catalog.html">
        <span class="brand-mark" aria-hidden="true">DL</span>
        <span>Digital Library</span>
      </a>
      <nav id="topNav" class="nav-links" aria-label="Main"></nav>
    </header>

    <main class="container grid">
      <section class="card" aria-labelledby="catalogHeading">
        <h1 id="catalogHeading">Book Catalog</h1>
        <p>Search by title, author, or ISBN.</p>

        <form id="searchForm" class="grid grid-2" novalidate>
          <label for="searchTerm">Search
            <input class="input" id="searchTerm" name="searchTerm" type="search" required>
          </label>
          <div class="button-row" style="align-self: end;">
            <button class="btn btn-primary" type="submit">Search</button>
            <button class="btn btn-outline" id="resetSearch" type="button">Reset</button>
          </div>
        </form>
        <p id="catalogMessage" class="message" role="status" aria-live="polite"></p>
      </section>

      <section class="card" aria-labelledby="catalogResultsHeading">
        <h2 id="catalogResultsHeading">Results</h2>
        <div id="catalogList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="assets/js/api.js" defer></script>
  <script src="assets/js/auth.js" defer></script>
  <script src="assets/js/ui.js" defer></script>
  <script src="assets/js/app.js" defer></script>
</body>
</html>
